<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Language Translator</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<div class="container">


<h1>🌐 AI Language Translator</h1>

<p class="sub">
Translate text using AI + Voice
</p>



<form method="POST">


<textarea 
id="text"
name="text"
placeholder="Enter text or use microphone..."
required></textarea>


<br>


<button 
type="button" 
onclick="startVoice()">

🎙️ Speak

</button>



<div class="languages">


<select name="source">


<option value="auto">
Auto Detect
</option>


<option value="en">
English
</option>

<option value="hi">
Hindi
</option>

<option value="te">
Telugu
</option>

<option value="ta">
Tamil
</option>

<option value="ml">
Malayalam
</option>

<option value="kn">
Kannada
</option>

<option value="bn">
Bengali
</option>

<option value="mr">
Marathi
</option>

<option value="gu">
Gujarati
</option>

<option value="pa">
Punjabi
</option>

<option value="ur">
Urdu
</option>

<option value="fr">
French
</option>

<option value="es">
Spanish
</option>

<option value="de">
German
</option>

<option value="it">
Italian
</option>

<option value="pt">
Portuguese
</option>

<option value="ru">
Russian
</option>

<option value="ja">
Japanese
</option>

<option value="ko">
Korean
</option>

<option value="zh-CN">
Chinese
</option>

<option value="ar">
Arabic
</option>

<option value="tr">
Turkish
</option>

<option value="nl">
Dutch
</option>

<option value="sv">
Swedish
</option>

<option value="fi">
Finnish
</option>

<option value="no">
Norwegian
</option>

<option value="da">
Danish
</option>

<option value="pl">
Polish
</option>

<option value="uk">
Ukrainian
</option>

<option value="vi">
Vietnamese
</option>

<option value="th">
Thai
</option>

<option value="id">
Indonesian
</option>

<option value="ne">
Nepali
</option>

<option value="si">
Sinhala
</option>

<option value="fa">
Persian
</option>

<option value="he">
Hebrew
</option>

<option value="sw">
Swahili
</option>


</select>





<select name="target">


<option value="en">
English
</option>


<option value="hi">
Hindi
</option>


<option value="te">
Telugu
</option>

<option value="ta">
Tamil
</option>

<option value="ml">
Malayalam
</option>

<option value="kn">
Kannada
</option>

<option value="fr">
French
</option>

<option value="es">
Spanish
</option>

<option value="de">
German
</option>

<option value="ja">
Japanese
</option>

<option value="ko">
Korean
</option>

<option value="zh-CN">
Chinese
</option>

<option value="ar">
Arabic
</option>

<option value="ru">
Russian
</option>


</select>


</div>





<button type="submit">

✨ Translate

</button>


</form>





<div class="result-box">


{{ translation if translation else 
"Your translated text will appear here..." }}


</div>





{% if audio %}


<div class="audio-box">


<h3>🔊 Translation Voice</h3>


<audio controls>

<source 
src="/static/{{audio}}" 
type="audio/mp3">

</audio>


</div>


{% endif %}







<script>


function startVoice(){


if(!('webkitSpeechRecognition' in window)){


alert("Speech recognition not supported");


return;

}



let recognition = 
new webkitSpeechRecognition();



recognition.lang="en-US";



recognition.start();




recognition.onresult=function(event){


let text =
event.results[0][0].transcript;


document.getElementById("text").value=text;


}


}



</script>





</div>


</body>


</html>
